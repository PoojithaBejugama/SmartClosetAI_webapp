name: Deploy Apps to Azure

on:
  push:
    branches:
      - azure-deployment
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy-apps.yaml"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  # These names match the defaults in infra/variables.tf and infra/main.tf:
  # project_name = "smartclosetai"
  # resource_group_name = "smartclosetai-rg"
  AZURE_RESOURCE_GROUP: smartclosetai-rg
  AZURE_BACKEND_APP_NAME: smartclosetai-backend
  AZURE_STATIC_WEB_APP_NAME: smartclosetai-frontend

jobs:
  terraform:
    name: Check/create Azure infrastructure
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    env:
      TF_VAR_subscription_id: ${{ secrets.TF_VAR_subscription_id }}
      TF_VAR_supabase_url: ${{ secrets.TF_VAR_supabase_url }}
      TF_VAR_supabase_anon_key: ${{ secrets.TF_VAR_supabase_anon_key }}
      TF_VAR_supabase_service_role_key: ${{ secrets.TF_VAR_supabase_service_role_key }}
      TF_VAR_database_url: ${{ secrets.TF_VAR_database_url }}
      TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_gemini_api_key }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate Azure login secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          test -n "$AZURE_CLIENT_ID" || (echo "Missing GitHub secret: AZURE_CLIENT_ID" && exit 1)
          test -n "$AZURE_TENANT_ID" || (echo "Missing GitHub secret: AZURE_TENANT_ID" && exit 1)
          test -n "$AZURE_SUBSCRIPTION_ID" || (echo "Missing GitHub secret: AZURE_SUBSCRIPTION_ID" && exit 1)

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan

      - name: Terraform apply
        run: terraform apply -auto-approve

  deploy-backend:
    name: Deploy FastAPI backend
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy backend folder to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_BACKEND_APP_NAME }}
          package: backend

  deploy-frontend:
    name: Deploy React frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    env:
      # Vite reads env vars at build time, so these must exist during this workflow.
      VITE_API_BASE_URL: https://smartclosetai-backend.azurewebsites.net
      VITE_DEMO_MODE: "false"
      VITE_AUTH_DEMO_MODE: "false"
      VITE_SUPABASE_URL: ${{ secrets.TF_VAR_supabase_url }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.TF_VAR_supabase_anon_key }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Static Web App deployment token
        id: swa-token
        run: |
          token=$(az staticwebapp secrets list \
            --name "$AZURE_STATIC_WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.apiKey" \
            --output tsv)
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          api_location: ""
          output_location: dist
          app_build_command: npm run build
